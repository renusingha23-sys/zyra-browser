<!DOCTYPE html>
<html>
  <body style="margin:0; height:100vh; background:#121212; color:#eee; font-family:sans-serif;">

    <div style="display:flex; padding:6px; background:#1e1e1e;">
      <input id="url"
             placeholder="https://example.com"
             style="flex:1; padding:8px; background:#2a2a2a; color:#eee; border:none; outline:none;">
      <button onclick="go()" style="margin-left:5px;">Go</button>
      <button onclick="clean()" style="margin-left:5px;">Clean</button>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;

      function go() {
        let url = document.getElementById("url").value.trim();
        if (!url.startsWith("http")) {
          url = "https://" + url;
        }
        window.location.href = url;
      }

      async function clean() {
        await invoke("clean_data");
        alert("Cleaned.");
      }
    </script>

  </body>
</html>
