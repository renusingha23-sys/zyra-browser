<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Zeon Browser</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.tab{
padding:6px 14px;
border-radius:8px;
background:#27272a;
cursor:pointer;
font-size:14px;
transition:all .15s ease;
}

.tab:hover{
background:#3f3f46;
}

.tab.active{
background:#10b981;
color:white;
}

.view{
width:100%;
height:100%;
}

/* center start image */

#start-screen{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
opacity:.8;
}

#start-image{
max-width:320px;
filter:drop-shadow(0 10px 20px rgba(0,0,0,.6));
}

/* corner logo */

#corner-logo{
position:absolute;
bottom:12px;
right:14px;
width:36px;
opacity:.7;
transition:opacity .2s;
}

#corner-logo:hover{
opacity:1;
}

</style>

</head>

<body class="bg-zinc-950 text-zinc-200">

<div class="flex flex-col h-screen relative">

<!-- TOP BAR -->

<div class="flex items-center gap-2 px-3 py-2 bg-zinc-900 border-b border-zinc-800">

<button id="back" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">
←
</button>

<button id="forward" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">
→
</button>

<button id="reload" class="px-3 py-1 bg-zinc-800 rounded hover:bg-zinc-700">
⟳
</button>

<div class="flex flex-1 items-center bg-zinc-800 rounded-lg px-3 py-1 ml-2">

<input
id="url"
type="text"
placeholder="Search or type URL"
class="flex-1 bg-transparent outline-none text-sm"
/>

<button
id="go"
class="ml-2 px-3 py-1 text-sm rounded bg-emerald-600 hover:bg-emerald-500">
Go
</button>

</div>

<button
id="newTab"
class="ml-2 px-3 py-1 rounded bg-purple-600 hover:bg-purple-500">
+
</button>

</div>

<!-- TABS -->

<div
id="tabs"
class="flex gap-2 px-2 py-2 bg-zinc-900 border-b border-zinc-800 overflow-x-auto">
</div>

<!-- VIEW AREA -->

<div id="views" class="flex-1 relative">

<!-- NEW TAB IMAGE -->

<div id="start-screen">
<img
id="start-image"
src="/src/assets/newtab.png"
alt="start"
/>
</div>

</div>

<!-- CORNER LOGO -->

<img
id="corner-logo"
src="/src/assets/zeon-browser.svg"
alt="zeon"
/>

</div>

<script type="module" src="/src/browser.js"></script>

<script>

/* hide newtab image when navigating */

const urlBar = document.getElementById("url")
const start = document.getElementById("start-screen")

urlBar.addEventListener("keydown", (e)=>{

if(e.key==="Enter"){
start.style.display="none"
}

})

</script>

</body>
</html>
