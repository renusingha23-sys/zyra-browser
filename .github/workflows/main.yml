name: Build Zyra Browser (Linux)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            curl \
            wget \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libarchive-tools # Required for creating pacman packages on Ubuntu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri App
        # We ensure pacman is included in the targets
        run: cargo tauri build --bundles deb,appimage,pacman

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: zyra-browser-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: zyra-browser-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      # New Step for Arch Linux Users
      - name: Upload Pacman package
        uses: actions/upload-artifact@v4
        with:
          name: zeon-browser-pacman
          path: src-tauri/target/release/bundle/pacman/*.tar.zst
